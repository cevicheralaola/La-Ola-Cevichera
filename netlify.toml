[build]
  publish = "."
  # Evita depender de npm si algo falla en el entorno; el script es solo Node.
  command = "node build.mjs"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
